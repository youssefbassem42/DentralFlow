version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: dcms-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dcms
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dcms"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: dcms-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/dcms?schema=public
      - JWT_SECRET=super_secret_key_change_me_in_production
      - JWT_EXPIRES_IN=1d
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX=100
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  uploads_data:
